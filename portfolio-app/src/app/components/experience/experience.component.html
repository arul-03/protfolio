<section id="experience" class="section experience">
  <div class="container">
    <div class="section-header reveal" #reveal>
      <span class="section-tag">experience</span>
      <h2>work-history.log</h2>
    </div>

    <div class="timeline">
      @for (exp of portfolio.experience; track exp.company) {
        <div class="timeline-item reveal" #reveal>
          <div class="timeline-marker"></div>
          <div class="timeline-content">
            <div class="timeline-header">
              <h3>{{ exp.company }}</h3>
              <span class="period">{{ exp.period }}</span>
            </div>
            <p class="role">{{ exp.role }}</p>

            @for (project of exp.projects; track project.name) {
              <div class="project-block">
                <h4>{{ project.name }}</h4>
                <ul>
                  @for (point of project.highlights; track point) {
                    <li>{{ point }}</li>
                  }
                </ul>
              </div>
            }
          </div>
        </div>
      }
    </div>
  </div>
</section>
