<section id="about" class="section about">
  <div class="container">
    <div class="section-header reveal" #reveal>
      <span class="section-tag">about</span>
      <h2>README.md</h2>
    </div>

    <div class="about-grid">
      <div class="about-text reveal" #reveal>
        <p>{{ portfolio.summary }}</p>
        <div class="info-grid">
          <div class="info-item">
            <span class="label">Location</span>
            <span class="value">{{ portfolio.location }}</span>
          </div>
          <div class="info-item">
            <span class="label">Email</span>
            <a class="value" [href]="'mailto:' + portfolio.email">{{ portfolio.email }}</a>
          </div>
          <div class="info-item">
            <span class="label">Phone</span>
            <a class="value" [href]="'tel:' + portfolio.phone">{{ portfolio.phone }}</a>
          </div>
          <div class="info-item">
            <span class="label">Role</span>
            <span class="value">{{ portfolio.title }}</span>
          </div>
        </div>
      </div>

      <div class="stats-grid reveal" #reveal>
        @for (stat of stats; track stat.label) {
          <div class="stat-card">
            <span class="stat-value">{{ stat.value }}</span>
            <span class="stat-label">{{ stat.label }}</span>
          </div>
        }
      </div>
    </div>
  </div>
</section>
